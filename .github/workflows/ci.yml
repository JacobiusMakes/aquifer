name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Security scan with bandit
        run: bandit -r aquifer/ -ll

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
          python -m spacy download en_core_web_sm

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=aquifer --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Generate synthetic data and batch test
        run: |
          python tests/generate_synthetic.py --count 5 --output /tmp/synthetic
          python -m aquifer deid /tmp/synthetic/ -o /tmp/aqf_out --vault /tmp/test.aqv --password ci-test --no-ner
          python -m aquifer vault stats /tmp/test.aqv --password ci-test

      - name: CLI smoke test
        run: |
          python -m aquifer --version
          python -m aquifer deid tests/fixtures/sample_clinical_note.txt -o /tmp/smoke.aqf --vault /tmp/smoke.aqv --password test --no-ner
          python -m aquifer inspect /tmp/smoke.aqf
          python -m aquifer rehydrate /tmp/smoke.aqf --vault /tmp/smoke.aqv --password test > /dev/null
